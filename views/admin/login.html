<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Morning Dew Hotel</title>
    <link rel="stylesheet" href="/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
</head>

<body class="bg-primary min-h-screen flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-md shadow-2xl p-10">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-playfair uppercase tracking-widest text-primary">Admin Access</h1>
            <p class="text-gray-400 text-xs uppercase tracking-[0.3em] mt-2">Morning Dew Hotel</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-xs uppercase tracking-widest font-bold text-gray-400">Username</label>
                <input type="text" name="username" required
                    class="w-full border-b border-gray-200 py-3 focus:outline-none focus:border-secondary transition-all">
            </div>
            <div class="space-y-2">
                <label class="block text-xs uppercase tracking-widest font-bold text-gray-400">Password</label>
                <input type="password" name="password" required
                    class="w-full border-b border-gray-200 py-3 focus:outline-none focus:border-secondary transition-all">
            </div>
            <button type="submit"
                class="w-full bg-secondary text-primary py-4 uppercase tracking-[0.2em] font-bold text-sm hover:bg-black hover:text-white transition-all duration-300">Authorize</button>
        </form>

        <p id="error-msg" class="text-red-500 text-xs text-center mt-6 hidden">Invalid credentials. Please try again.
        </p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    const { token } = await res.json();
                    localStorage.setItem('admin_token', token);
                    window.location.href = '/admin/dashboard';
                } else {
                    document.getElementById('error-msg').classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>

</html>
