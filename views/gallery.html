<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Morning Dew Hotel Ella</title>
    <link rel="stylesheet" href="/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>

<body class="bg-white">
    <!-- Navbar -->
    <nav id="navbar"
        class="fixed top-0 left-0 w-full z-50 py-6 px-10 flex justify-between items-center text-primary bg-white/80 backdrop-blur-md">
        <div class="font-playfair text-2xl uppercase tracking-widest font-bold">Morning Dew<span
                class="text-secondary">.</span></div>
    </nav>

    <section class="pt-40 pb-24 px-10 max-w-7xl mx-auto">
        <h1 class="text-6xl font-playfair mb-12 text-center">Gallery</h1>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="h-64 md:h-[400px] overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=600&q=80"
                    class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700 cursor-pointer scale-110 group-hover:scale-100">
            </div>
            <div class="h-64 md:h-80 overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?auto=format&fit=crop&w=600&q=80"
                    class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700 cursor-pointer scale-110 group-hover:scale-100">
            </div>
            <div class="h-64 md:h-[500px] md:row-span-2 overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1571896349842-33c89424de2d?auto=format&fit=crop&w=600&q=80"
                    class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700 cursor-pointer scale-110 group-hover:scale-100">
            </div>
            <div class="h-64 md:h-72 overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=600&q=80"
                    class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700 cursor-pointer scale-110 group-hover:scale-100">
            </div>
            <div class="h-64 md:h-[400px] overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1582719508461-905c673771fd?auto=format&fit=crop&w=600&q=80"
                    class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700 cursor-pointer scale-110 group-hover:scale-100">
            </div>
            <div class="h-64 md:h-96 overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1549488344-1f9b8d2bd1f3?auto=format&fit=crop&w=600&q=80"
                    class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700 cursor-pointer scale-110 group-hover:scale-100">
            </div>
            <div class="h-64 md:h-80 overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1550966842-28c460ff9491?auto=format&fit=crop&w=600&q=80"
                    class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700 cursor-pointer scale-110 group-hover:scale-100">
            </div>
        </div>
    </section>

    <footer class="bg-primary text-white py-10 text-center uppercase tracking-widest text-xs opacity-50">
        &copy; 2026 Morning Dew Hotel
    </footer>
</body>

</html>
